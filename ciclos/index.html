<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ciclos — Tobal Blu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070a; --fg:#f4f4f2; --grey:#8d8d88; --grey-d:#5a5a56;
    --line:rgba(244,244,242,.14);
    --moss:#a9b88c; --celeste:#8fd3ec; --gold:#e8cf8b; --warn:#e0876f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#000;color:var(--fg);font-family:'Archivo',sans-serif;font-weight:300;
       display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
  /* STAGE — siempre vertical 9:16, se ajusta a móvil y desktop */
  .frame{position:relative;
         width:min(100vw, calc(100vh * 9 / 16));
         height:min(100vh, calc(100vw * 16 / 9));
         overflow:hidden;background:var(--bg);user-select:none;
         box-shadow:0 0 60px rgba(0,0,0,.6)}
  #cv{position:absolute;inset:0;width:100%;height:100%;z-index:2;display:block}
  canvas.spr{image-rendering:pixelated;display:block}

  /* LANDING */
  .landing{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;
           gap:18px;background:radial-gradient(120% 80% at 50% 30%,#0b1016,#000 70%);cursor:pointer;transition:opacity .5s;text-align:center;padding:0 8%}
  .landing h1{font-weight:300;letter-spacing:.22em;font-size:clamp(34px,12vw,64px);color:var(--fg);
              transition:color .3s,letter-spacing .4s}
  .landing:hover h1{color:var(--moss);letter-spacing:.3em}
  .landing .dot{color:var(--grey-d)}
  .landing .pre{font-size:clamp(12px,3.4vw,15px);color:var(--grey);letter-spacing:.14em;max-width:30ch;font-weight:300}
  .landing .enter{margin-top:10px;font-size:clamp(15px,4vw,19px);letter-spacing:.16em;color:var(--moss);transition:.25s}
  .landing:hover .enter{letter-spacing:.24em}

  .screen{position:absolute;inset:0;z-index:20;display:none}
  .screen.on{display:block}

  /* SELECT — vertical: personaje arriba, opciones abajo */
  #selectScreen{background:var(--bg)}
  .selrow{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:clamp(14px,3vh,28px);padding:4vh 5vw}
  .charcol{position:relative;flex:0 0 auto}
  #charCv{position:relative;z-index:2}
  .hot{position:absolute;z-index:3;cursor:pointer;border-radius:6px;transition:background .15s,box-shadow .15s}
  .hot:hover{background:rgba(244,244,242,.05);box-shadow:inset 0 0 0 1px var(--line)}
  .optcol{flex:0 0 auto;width:min(360px,92%);display:flex;flex-direction:column;gap:18px;
          align-items:center;justify-content:center}
  .optslot{display:flex;flex-direction:column;gap:14px;min-height:64px;justify-content:center;align-items:center;
           opacity:0;transition:opacity .25s}
  .optslot.on{opacity:1}
  .grp{display:flex;gap:9px;align-items:center;justify-content:center}
  .sq{width:34px;height:34px;border-radius:8px;cursor:pointer;border:2px solid transparent;
      display:flex;align-items:center;justify-content:center;transition:.12s;color:var(--fg)}
  .sq:hover{transform:translateY(-2px)}
  .sq.sel{border-color:var(--fg)}
  .sq.tone{background:rgba(244,244,242,.06)}
  .sq svg{width:20px;height:20px}
  .eyerow{display:flex;flex-direction:column;gap:8px;align-items:center}
  .eyerow input[type=color]{width:150px;height:42px;border:none;background:none;cursor:pointer;border-radius:8px}
  .seedot{font-size:12px;color:var(--grey-d);letter-spacing:.12em;text-transform:uppercase;min-height:14px;text-align:center}
  .jugar{cursor:pointer;font-weight:300;font-size:clamp(22px,5vw,30px);letter-spacing:.12em;color:var(--fg);
         background:none;border:none;transition:.25s;font-family:inherit;padding:0}
  .jugar:hover{color:var(--grey);letter-spacing:.2em}
  .jugar .arr{color:var(--moss)}

  /* DIFFICULTY */
  .diffwrap{position:absolute;z-index:25;inset:0;display:none;align-items:center;justify-content:center;
            flex-direction:column;gap:24px;background:rgba(0,0,0,.84);backdrop-filter:blur(3px)}
  .diffwrap.on{display:flex}
  .diffwrap .q{font-weight:300;letter-spacing:.18em;font-size:15px;color:var(--grey);text-transform:uppercase}
  .diffboxes{display:flex;gap:18px}
  .dbox{width:88px;height:110px;border:1px solid var(--line);border-radius:12px;cursor:pointer;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;transition:.18s}
  .dbox:hover{border-color:var(--fg);background:rgba(244,244,242,.04);transform:translateY(-3px)}
  .dbox .rn{font-size:30px;font-weight:300;letter-spacing:.05em}
  .dbox .lv{font-size:11px;color:var(--grey);letter-spacing:.1em}
  .diffwrap .back{font-size:13px;color:var(--grey-d);cursor:pointer;letter-spacing:.1em}
  .diffwrap .back:hover{color:var(--grey)}

  /* HUD */
  .hud{position:absolute;inset:0;z-index:14;pointer-events:none;display:none}
  .hud.on{display:block}
  .hud-top{position:absolute;top:18px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:flex-start}
  .stat .lab{font-size:10px;color:var(--grey);letter-spacing:.18em;text-transform:uppercase}
  .stat .val{font-size:24px;font-weight:300;margin-top:2px}
  .stat.c{text-align:center}.stat.r{text-align:right}
  .lives{display:flex;gap:7px;margin-top:6px;justify-content:flex-end}
  .life{width:11px;height:11px;border-radius:50%;background:var(--fg);transition:.25s}
  .life.gone{background:transparent;box-shadow:inset 0 0 0 1.5px var(--grey-d);opacity:.5}
  .count{position:absolute;top:30%;left:0;right:0;text-align:center;font-size:74px;font-weight:300;color:var(--fg);opacity:0}
  .judge{position:absolute;top:60%;left:0;right:0;text-align:center;font-size:30px;font-weight:400;letter-spacing:.04em;opacity:0;transition:opacity .07s}
  .readout{position:absolute;bottom:118px;left:0;right:0;text-align:center;font-size:12px;color:var(--grey);letter-spacing:.12em}
  /* PADS — tres zonas alineadas a los carriles: bombo / hats / caja */
  .pads{position:absolute;bottom:18px;left:0;right:0;z-index:14;display:none;gap:10px;justify-content:space-around;padding:0 4%;pointer-events:none}
  .pads.on{display:flex}
  .pad{pointer-events:auto;cursor:pointer;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
       padding:11px 0;width:30%;text-align:center;border:1px solid var(--line);border-radius:10px;
       color:var(--grey);background:rgba(0,0,0,.4);transition:.08s}
  .pad small{display:block;font-size:9px;color:var(--grey-d);letter-spacing:.08em;margin-top:3px}
  .pad:active{transform:scale(.96)}
  .pad.kick.flash{border-color:var(--moss);color:var(--moss)}
  .pad.hat.flash{border-color:var(--gold);color:var(--gold)}
  .pad.snare.flash{border-color:var(--celeste);color:var(--celeste)}
  .mute{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:16;pointer-events:auto;
        cursor:pointer;font-size:11px;color:var(--grey-d);background:none;border:none;letter-spacing:.1em;font-family:inherit}

  /* OVER */
  #overScreen{background:rgba(0,0,0,.9);backdrop-filter:blur(3px);z-index:24}
  .overin{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px}
  .overin h2{font-weight:300;letter-spacing:.12em;font-size:clamp(26px,7vw,40px)}
  .overin .tag{letter-spacing:.2em;font-size:14px;color:var(--gold)}
  .overin .sub{color:var(--grey);font-size:15px;max-width:34ch;font-weight:300}
  .res{display:flex;gap:28px;margin-top:4px}
  .res .val{font-size:26px;font-weight:300;color:var(--moss)}
  .btn{cursor:pointer;font-family:inherit;font-weight:300;font-size:17px;letter-spacing:.1em;color:var(--fg);
       background:none;border:1px solid var(--line);border-radius:10px;padding:10px 24px;transition:.18s}
  .btn:hover{border-color:var(--fg);background:rgba(244,244,242,.04)}
  .btn.go{border-color:var(--moss);color:var(--moss)}
  .btn.go:hover{background:rgba(169,184,140,.1)}
  .btnrow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:6px}
  .hint{font-size:12px;color:var(--grey-d);letter-spacing:.08em}
</style>
</head>
<body>
<div class="frame" id="frame">
  <canvas id="cv"></canvas>

  <!-- LANDING -->
  <div class="landing" id="landing">
    <h1>CICLOS<span class="dot">.</span></h1>
    <div class="pre">Juega el fragmento antes del estreno</div>
    <div class="enter">Entrar al ciclo ▸</div>
  </div>

  <!-- SELECT -->
  <div class="screen" id="selectScreen">
    <div class="selrow">
      <div class="charcol" id="charcol">
        <canvas id="charCv" class="spr"></canvas>
        <div class="hot" id="hotHair"></div>
        <div class="hot" id="hotEyes"></div>
        <div class="hot" id="hotArmor"></div>
      </div>
      <div class="optcol">
        <div class="seedot" id="seedot"></div>
        <div class="optslot" id="optSlot"></div>
        <button class="jugar" id="jugarBtn">Jugar <span class="arr">▸</span></button>
      </div>
    </div>
    <div class="diffwrap" id="diffwrap">
      <div class="q">¿cuántas oportunidades?</div>
      <div class="diffboxes" id="diffboxes">
        <div class="dbox" data-d="I"><span class="rn">I</span><span class="lv">5 vidas</span></div>
        <div class="dbox" data-d="II"><span class="rn">II</span><span class="lv">3 vidas</span></div>
        <div class="dbox" data-d="III"><span class="rn">III</span><span class="lv">1 vida</span></div>
      </div>
      <div class="back" id="diffBack">← volver</div>
    </div>
  </div>

  <!-- HUD -->
  <div class="hud" id="hud">
    <div class="hud-top">
      <div class="stat"><div class="lab">Puntos</div><div class="val" id="score">0</div></div>
      <div class="stat c"><div class="lab">Combo</div><div class="val" id="combo">0</div></div>
      <div class="stat r"><div class="lab">Vidas</div><div class="lives" id="lives"></div></div>
    </div>
    <div class="count" id="count"></div>
    <div class="judge" id="judge"></div>
    <div class="readout" id="readout"></div>
  </div>
  <div class="pads" id="pads">
    <div class="pad kick" id="padKick">Bombo<small>espacio</small></div>
    <div class="pad hat" id="padHat">Hats<small>E</small></div>
    <div class="pad snare" id="padSnare">Caja<small>I</small></div>
  </div>
  <button class="mute" id="muteBtn" style="display:none">vol ◼</button>

  <!-- OVER -->
  <div class="screen" id="overScreen">
    <div class="overin">
      <h2 id="overTitle"></h2>
      <canvas id="endCv" class="spr" width="170" height="220"></canvas>
      <div class="tag" id="endTag"></div>
      <div class="sub" id="overSub"></div>
      <div class="res">
        <div class="stat c"><div class="lab">Puntos</div><div class="val" id="overScore">0</div></div>
        <div class="stat c"><div class="lab">Intentos</div><div class="val" id="overTries">1</div></div>
        <div class="stat c"><div class="lab">Combo máx</div><div class="val" id="overCombo">0</div></div>
      </div>
      <div class="btnrow">
        <button class="btn" id="dlBtn" style="display:none">↓ Descargar avatar (PNG)</button>
        <button class="btn go" id="retryBtn">↻ De nuevo</button>
        <button class="btn" id="changeBtn">Cambiar avatar</button>
      </div>
      <div class="hint" id="overHint"></div>
    </div>
  </div>
</div>

<script>
"use strict";
/* ===========================================================================
   CICLOS · Tobal Blu — v5  (vertical 9:16 · modular)
   100 BPM · t=0 audio = compás 1 beat 1.
   CARRILES:  IZQ = Bombo (espacio) · CENTRO = Hats (E) · DER = Caja (I)
   KICK : beats 1.0 y 2.5 → ROCAS (carril izq) · ESPACIO
   CAJA : redoble intro 5.4 + backbeat 2 y 4 → coreografía AUTO (carril der) · I
   HATS : nomenclatura de Tóbal (C12–C57) → cabeza (carril centro) · E (sin costo de vida)
   Dificultad = oportunidades (vidas). Juego completo idéntico en los 3.
   Estructura: CONFIG · AVATAR · SELECT · CONDUCTOR(audio) · CHART · STATE ·
               INPUT · FLOW · RENDER · INIT
   =========================================================================== */

/* ===========================================================================
   CONFIG
   =========================================================================== */
const SRC="ciclos.mp3";
const FIRMA="https://tobalblu.com/img/firma.jpeg";
const DRUM_SAMPLES={kick:"kick.wav",hihat:"hihat.wav",snare:"snare.wav"};
const BPM=100, BEAT=60/BPM, BAR=BEAT*4, WIN=0.12;
const KICK_BEATS=[1.0,2.5], SNARE_BEATS=[2.0,4.0];
const DRUM_START_BAR=6, DRUM_END_BAR=57;
const SNARE_INTRO_BAR=5, SNARE_INTRO=[3.25,3.5,3.75,4.0];
const DIFF={ I:{lives:5}, II:{lives:3}, III:{lives:1} };
let selDiff="II";

/* HATS — nomenclatura de Tóbal: grupos alternados golpe/silencio en corcheas */
const HAT_CODES={12:"422",13:"800",14:"11312",15:"512",16:"512",17:"8",18:"512",19:"512",20:"512",
21:"800",22:"512",23:"512",24:"512",25:"800",26:"512",27:"512",28:"512",29:"800",30:"512",31:"512",
32:"512",33:"800",34:"800",35:"800",36:"800",37:"800",38:"71",39:"71",40:"800",41:"800",42:"800",
43:"71",44:"71",45:"71",46:"800",47:"800",48:"800",49:"800",50:"800",51:"800",52:"800",53:"800",
54:"800",55:"800",56:"800",57:"800"};
function expandHat(code){let o="",hit=true;for(const ch of String(code)){o+=(hit?"X":"_").repeat(+ch);hit=!hit;}return (o+"________").slice(0,8);}
const HATS={}; for(const c in HAT_CODES) HATS[+c]=expandHat(HAT_CODES[c]);

/* palettes */
const ARMOR={ celeste:{base:"#8fd3ec",hi:"#d6f2fb",sh:"#4f93b3",trim:"#cdeafc"},
              dorado :{base:"#e8c55a",hi:"#fff0b0",sh:"#a87f24",trim:"#fff2c0"} };
const SKIN={base:"#e9bd92",sh:"#c89169"};
const HAIR_COLORS=["#20212a","#5b3a21","#caa24e"];
const HAIR_LENS=["corto","medio","largo"];
const HAIR_STYLES=["liso","alborotado"];
let cfg={ name:"", armor:"celeste", hairLen:"medio", hairStyle:"liso", hairColor:HAIR_COLORS[1], eye:"#6f9a5c" };

/* ===========================================================================
   AVATAR — PIXEL KNIGHT (16x28). pose:{hop,move,headBob,legPhase,reveal,highlight}
   =========================================================================== */
function shade(hex,a){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const f=t=>Math.max(0,Math.min(255,Math.round(t+255*a)));
  return"#"+[f(r),f(g),f(b)].map(v=>v.toString(16).padStart(2,"0")).join("");}
function drawKnight(g,cx,feetY,S,c,pose){
  pose=pose||{}; const A=ARMOR[c.armor];
  const move=pose.move||null; const mp=move?move.prog:0;
  const hop=(pose.hop||0)*S*9; const baseY=feetY-hop;
  const spin=(move&&move.key==="O")? mp*Math.PI*2 : 0;
  g.save();
  if(spin){g.translate(cx,baseY-S*14);g.rotate(spin);g.translate(-cx,-(baseY-S*14));}
  const X=gx=>cx+(gx-8)*S, Y=gy=>baseY+(gy-28)*S;
  const P=(gx,gy,gw,gh,col)=>{g.fillStyle=col;g.fillRect(X(gx),Y(gy),gw*S+0.6,gh*S+0.6);};
  const legP=Math.sin((pose.legPhase||0)*Math.PI*2);
  const jumping=(pose.hop||0)>0.04;
  const hairC=c.hairColor,hairS=shade(hairC,-0.16);

  if(c.hairLen!=="corto"){const bottom=c.hairLen==="largo"?23:17;
    P(3,8,2,bottom-8,hairS);P(4,8,1,bottom-8,hairC);
    if(c.hairStyle==="alborotado"){P(2,9,1,4,hairS);P(2,14,1,3,hairS);}}

  /* legs ('K' = patada con pierna delantera) */
  const legKick=move&&move.key==="K";
  P(5,22,3,3,A.base);P(5,25,3,1,A.sh);
  if(legKick){P(10,20-Math.round(mp*3),3,3,A.base);P(11,19-Math.round(mp*3),2,1,A.hi);}
  else{P(9,22,3,3,A.base);P(9,25,3,1,A.sh);}
  P(5,26-(jumping?1:0),3,2,A.trim);
  if(!legKick)P(9,26-(jumping?1:0),3,2,A.trim);

  /* torso */
  P(4,15,8,7,A.base);P(4,15,8,1,A.hi);P(4,21,8,1,A.sh);
  P(5,17,2,3,A.hi);P(9,17,1,3,A.sh);
  P(3,14,3,2,A.base);P(3,14,3,1,A.hi);P(10,14,3,2,A.base);P(10,14,3,1,A.hi);

  /* arms — front animates by snare move */
  P(3,16,2,5,A.sh);
  let fa={x:11,y:16,w:2,h:5};
  if(move){const k=move.key;
    if(k==="U"){fa={x:12,y:11-Math.round(mp*2),w:2,h:5};}
    else if(k==="I"){fa={x:12,y:10-Math.round(mp*3),w:2,h:6};}
    else if(k==="P"){fa={x:12+Math.round(mp*2),y:16,w:3,h:2};}
    else if(k==="J"){fa={x:12+Math.round(mp*2),y:19,w:3,h:2};}
    else if(k==="L"){fa={x:12,y:13+Math.round(mp*3),w:2,h:5};}
    else if(k==="O"){fa={x:12,y:14,w:2,h:4};}
  }
  P(fa.x,fa.y,fa.w,fa.h,A.base);P(fa.x,fa.y,fa.w,1,A.hi);
  if(move&&(move.key==="U"||move.key==="I")){P(2,11-Math.round(mp*2),2,5,A.base);P(2,11-Math.round(mp*2),2,1,A.hi);}

  /* neck */
  P(6,13,4,2,SKIN.sh);
  /* head assembly — bobs on hat (E) */
  const hd=pose.headBob?-Math.sin(Math.min(1,pose.headBob)*Math.PI)*0.9:0;
  g.save();g.translate(0,hd*S);
  P(5,8,6,6,SKIN.base);P(5,12,6,1,SKIN.sh);
  if(c.hairLen!=="corto"){P(5,11,1,2,hairC);P(10,11,1,2,hairC);}
  if(c.hairStyle==="alborotado"){P(5,7,1,1,hairC);P(10,7,1,1,hairC);}
  const eyeCol=pose.reveal?c.eye:SKIN.sh;
  P(6,10,1,1,eyeCol);P(9,10,1,1,eyeCol);
  P(4,4,8,4,A.base);P(5,3,6,1,A.base);P(4,4,8,1,A.hi);P(4,7,8,1,A.sh);P(5,8,6,1,A.sh);
  if(c.armor==="celeste"){P(2,4,2,2,A.trim);P(1,5,1,2,A.hi);P(12,4,2,2,A.trim);P(14,5,1,2,A.hi);P(7,2,2,1,A.hi);}
  else{P(7,0,2,4,A.trim);P(7,0,1,4,A.hi);P(3,5,1,2,A.trim);P(12,5,1,2,A.trim);}
  g.restore();

  if(pose.highlight){g.fillStyle="rgba(244,244,242,.12)";
    if(pose.highlight==="hair"){g.fillRect(X(1),Y(0),14*S,9*S);}
    else if(pose.highlight==="eyes"){g.fillRect(X(5),Y(9),6*S,3*S);}
    else if(pose.highlight==="armor"){g.fillRect(X(3),Y(14),10*S,14*S);}}
  g.restore();
}

/* ===========================================================================
   SELECT UI (personaje + opciones)
   =========================================================================== */
const charCv=document.getElementById("charCv");
let charS=14, hover=null, selectedPart=null;
function sizeChar(){const h=Math.min(window.innerHeight*0.42,360);charS=Math.max(8,Math.round(h/28));
  charCv.width=16*charS;charCv.height=28*charS+charS;
  charCv.style.width=charCv.width+"px";charCv.style.height=charCv.height+"px";layoutHotspots();}
function renderChar(){const g=charCv.getContext("2d");g.imageSmoothingEnabled=false;
  g.clearRect(0,0,charCv.width,charCv.height);
  drawKnight(g,charCv.width/2,charCv.height-charS,charS,cfg,
    {legPhase:performance.now()/900,reveal:(hover==="eyes"||selectedPart==="eyes"),highlight:hover||selectedPart});}
function layoutHotspots(){const w=charCv.width,S=charS,cx=w/2,feet=charCv.height-S,top=feet-28*S;
  const set=(id,x,y,ww,hh)=>{const e=document.getElementById(id);e.style.left=x+"px";e.style.top=y+"px";e.style.width=ww+"px";e.style.height=hh+"px";};
  set("hotHair",cx-7*S,top+0*S,14*S,9*S);
  set("hotEyes",cx-3*S,top+9*S,6*S,4*S);
  set("hotArmor",cx-5*S,top+14*S,10*S,14*S);}

const optSlot=document.getElementById("optSlot");

/* ===========================================================================
   CONDUCTOR — audio + reloj musical (sample-accurate en modo buffer)
   =========================================================================== */
let AC=null,master=null,mode="synth",musicBuf=null,srcNode=null,audioEl=null,T0=0,muted=false;
let samples={kick:null,hihat:null,snare:null};
function ensureAC(){if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.connect(AC.destination);}if(AC.state==="suspended")AC.resume();}
async function loadMusic(){ensureAC();
  try{const r=await fetch(SRC);if(!r.ok)throw 0;const ab=await r.arrayBuffer();musicBuf=await AC.decodeAudioData(ab);mode="buffer";return;}catch(e){}
  try{audioEl=new Audio(SRC);audioEl.preload="auto";
    await new Promise((res,rej)=>{let d=false;
      audioEl.addEventListener("canplaythrough",()=>{if(!d){d=true;res();}},{once:true});
      audioEl.addEventListener("error",()=>{if(!d){d=true;rej();}},{once:true});
      setTimeout(()=>{if(!d){d=true;(audioEl.readyState>=3?res():rej());}},4000);});
    mode="element";return;}catch(e){}
  mode="synth";}
async function loadSamples(){ensureAC();
  for(const k in DRUM_SAMPLES){
    try{const r=await fetch(DRUM_SAMPLES[k]);if(!r.ok)throw 0;const ab=await r.arrayBuffer();samples[k]=await AC.decodeAudioData(ab);}
    catch(e){samples[k]=null;}
  }}
function songTime(){if(mode==="element")return audioEl?audioEl.currentTime:0;return AC.currentTime-T0;}
function startMusic(){
  if(mode==="buffer"){if(srcNode){try{srcNode.stop();}catch(e){}}srcNode=AC.createBufferSource();srcNode.buffer=musicBuf;srcNode.connect(master);T0=AC.currentTime+0.18;srcNode.start(T0);}
  else if(mode==="element"){audioEl.pause();audioEl.currentTime=0;audioEl.volume=muted?0:0.9;audioEl.play();T0=AC.currentTime;}
  else{T0=AC.currentTime+0.9;}}
function stopMusic(){if(mode==="buffer"&&srcNode){try{srcNode.stop();}catch(e){}}if(mode==="element"&&audioEl)audioEl.pause();}
/* one-shot del wav del instrumento (capa táctil sobre la pista) */
function playSample(name){if(!AC||muted)return false;const b=samples[name];if(!b)return false;
  const s=AC.createBufferSource();s.buffer=b;const gn=AC.createGain();gn.gain.value=0.5;s.connect(gn).connect(master);s.start();return true;}
/* fallback sintético si el wav no cargó */
function synthTick(name){if(!AC||muted)return;const t=AC.currentTime,o=AC.createOscillator(),gn=AC.createGain();
  o.type=name==="kick"?"sine":"triangle";o.frequency.value=name==="kick"?120:name==="snare"?320:1100;
  gn.gain.setValueAtTime(name==="kick"?0.5:0.18,t);gn.gain.exponentialRampToValueAtTime(0.0001,t+(name==="kick"?0.2:0.06));
  o.connect(gn).connect(master);o.start(t);o.stop(t+0.25);}
function playHit(name){ if(!playSample(name)) synthTick(name); }

/* ===========================================================================
   CHART
   =========================================================================== */
let kickNotes=[],snareNotes=[],hatNotes=[],hatTimes=[];
function bt(bar,beat){return((bar-1)*4+(beat-1))*BEAT;}
function buildChart(){
  kickNotes=[];snareNotes=[];hatNotes=[];hatTimes=[];
  for(let bar=DRUM_START_BAR;bar<=DRUM_END_BAR;bar++)
    KICK_BEATS.forEach(b=>kickNotes.push({t:bt(bar,b),judged:false,res:null,bar}));
  SNARE_INTRO.forEach(b=>snareNotes.push({t:bt(SNARE_INTRO_BAR,b),judged:false,res:null,bar:SNARE_INTRO_BAR}));
  for(let bar=DRUM_START_BAR;bar<=DRUM_END_BAR;bar++)
    SNARE_BEATS.forEach(b=>snareNotes.push({t:bt(bar,b),judged:false,res:null,bar}));
  for(const c in HATS){const pat=HATS[c];for(let s=0;s<8;s++)if(pat[s]!=="_"){const t=bt(+c,1+s*0.5);hatNotes.push({t,judged:false,res:null});hatTimes.push(t);}}
}

/* ===========================================================================
   STATE
   =========================================================================== */
let state="landing",lives=3,score=0,combo=0,maxCombo=0,tries=1;
let knight={hop:0,hopV:0,move:null,headT:-9,stumbleT:-9};
let lastJudge={txt:"",col:"",t:-9};
let laneFlash={kick:-9,hat:-9,snare:-9};
let firmaImg=new Image(); firmaImg.crossOrigin="anonymous"; let firmaOk=false;
firmaImg.onload=()=>firmaOk=true; firmaImg.onerror=()=>firmaOk=false; firmaImg.src=FIRMA;

const cv=document.getElementById("cv"),ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){const r=cv.getBoundingClientRect();DPR=Math.min(window.devicePixelRatio||1,2);W=r.width;H=r.height;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
new ResizeObserver(resize).observe(cv);resize();

/* lanes (x relativo) — IZQ bombo · CENTRO hats · DER caja */
function lanes(){return{kick:W*0.28,hat:W*0.50,snare:W*0.72};}

/* ===========================================================================
   INPUT — espacio / E / I  (caja con coreografía automática)
   =========================================================================== */
const PAD_MOVES=["U","I","O","P","J","K","L"]; let padMoveI=0;
function judge(notes){const t=songTime();let best=-1,err=1e9;
  for(let i=0;i<notes.length;i++){if(notes[i].judged)continue;const e=Math.abs(notes[i].t-t);if(e<err){err=e;best=i;}}
  if(best>=0&&err<=WIN){const n=notes[best];n.judged=true;const perfect=err<=WIN*0.45;n.res=perfect?"perfecto":"bien";
    score+=perfect?100:55;combo++;maxCombo=Math.max(maxCombo,combo);score+=Math.floor(combo/8)*5;
    showJudge(perfect?"¡perfecto!":"bien",perfect?"var(--moss)":"var(--gold)");return true;}
  return false;}
function judgeHat(){const t=songTime();let best=-1,err=1e9;
  for(let i=0;i<hatNotes.length;i++){if(hatNotes[i].judged)continue;const e=Math.abs(hatNotes[i].t-t);if(e<err){err=e;best=i;}}
  if(best>=0&&err<=WIN){const n=hatNotes[best];n.judged=true;n.res=err<=WIN*0.45?"perfecto":"bien";
    score+=15;combo++;maxCombo=Math.max(maxCombo,combo);return true;}
  return false;}
function kickHit(){if(state!=="play"&&state!=="run")return;ensureAC();
  if(judge(kickNotes)){knight.hop=0.01;knight.hopV=0.40;}else{knight.hopV=0.2;knight.hop=0.005;}
  laneFlash.kick=songTime();playHit("kick");flashPad("padKick");}
function snareHit(){if(state!=="play"&&state!=="run")return;ensureAC();
  knight.move={key:PAD_MOVES[padMoveI++%PAD_MOVES.length],t:songTime()};
  judge(snareNotes);laneFlash.snare=songTime();playHit("snare");flashPad("padSnare");}
function hatHit(){if(state!=="play"&&state!=="run")return;ensureAC();
  knight.headT=songTime();judgeHat();laneFlash.hat=songTime();playHit("hihat");flashPad("padHat");}
function flashPad(id){const p=document.getElementById(id);p.classList.add("flash");setTimeout(()=>p.classList.remove("flash"),90);}
window.addEventListener("keydown",e=>{
  const ae=document.activeElement;
  if(ae&&(ae.tagName==="INPUT"||ae.tagName==="TEXTAREA"))return;
  if(e.code==="Space"){e.preventDefault();kickHit();}
  else if(e.code==="KeyE"){e.preventDefault();hatHit();}
  else if(e.code==="KeyI"){e.preventDefault();snareHit();}
});
document.getElementById("padKick").addEventListener("pointerdown",e=>{e.preventDefault();kickHit();});
document.getElementById("padHat").addEventListener("pointerdown",e=>{e.preventDefault();hatHit();});
document.getElementById("padSnare").addEventListener("pointerdown",e=>{e.preventDefault();snareHit();});
function showJudge(txt,col){lastJudge={txt,col,t:songTime()};}
function loseLife(){combo=0;lives--;knight.stumbleT=songTime();showJudge("¡fallo!","var(--warn)");renderLives();if(lives<=0)gameOver(false);}

function renderLives(){const w=document.getElementById("lives");w.innerHTML="";
  for(let i=0;i<DIFF[selDiff].lives;i++){const d=document.createElement("div");d.className="life"+(i>=lives?" gone":"");w.appendChild(d);}}

/* ===========================================================================
   RENDER — vertical: notas caen de arriba hacia hitY (zona de impacto inferior)
   =========================================================================== */
const TRAVEL=1.7;
function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,W,H);
  if(state==="select"){renderChar();}
  if(state==="landing"||state==="select"||state==="over"){drawTag(performance.now()/1000*0.2);return;}

  const time=songTime();
  const L=lanes();
  const hitY=H*0.78, topY=H*0.06;
  const pps=(hitY-topY)/TRAVEL;          // px por segundo (vertical)

  drawRiver(time,L,hitY,topY);
  drawTag(time);
  drawBeatLines(time,hitY,pps,L);
  drawHitZone(time,L,hitY);

  drawHatNotes(time,L.hat,hitY,pps);
  drawSnareNotes(time,L.snare,hitY,pps);
  drawKickNotes(time,L.kick,hitY,pps);

  /* avatar centro-bajo */
  updateKnight();
  const S=Math.max(4,H*0.012);
  const feetY=H*0.985;
  if(knight.move&&(time-knight.move.t)>0.26)knight.move=null;
  const moveObj=knight.move?{key:knight.move.key,prog:Math.min(1,(time-knight.move.t)/0.18)}:null;
  const headBob=(time-knight.headT)<0.16?(time-knight.headT)/0.16:0;
  ctx.imageSmoothingEnabled=false;
  drawKnight(ctx,W*0.5,feetY,S,cfg,{hop:knight.hop,move:moveObj,headBob,legPhase:time/BEAT});

  /* HUD numérico */
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  const cEl=document.getElementById("count");
  if(time<BAR&&time>-0.1){const beat=Math.floor(time/BEAT)+1;cEl.textContent=String(Math.min(4,beat));cEl.style.opacity=1-((time%BEAT)/BEAT)*0.6;}
  else cEl.style.opacity=0;
  const bar=Math.max(1,Math.min(DRUM_END_BAR,Math.floor(time/BAR)+1));
  document.getElementById("readout").textContent="intento "+tries+" · compás "+bar+"/"+DRUM_END_BAR;
  if(state==="run"&&time>=0)state="play";
  if(state==="play"&&time>bt(DRUM_END_BAR,4)+1.2)gameOver(true);

  const jt=document.getElementById("judge");
  if(time-lastJudge.t<0.5){jt.textContent=lastJudge.txt;jt.style.color=lastJudge.col;jt.style.opacity=Math.max(0,1-(time-lastJudge.t)/0.5);}
  else jt.style.opacity=0;
}

/* disco-vinilo arriba: la fuente de la que "baja" el río */
function drawTag(time){
  const cx=W*0.5,cy=H*0.165,R=Math.min(W,H)*0.20;
  ctx.save();ctx.globalAlpha=(state==="play"||state==="run")?0.42:0.3;
  ctx.translate(cx,cy);ctx.rotate(time*(33.3/60)*Math.PI*2/9);
  ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);ctx.fillStyle="#0a0a0a";ctx.fill();
  ctx.strokeStyle="rgba(244,244,242,.05)";ctx.lineWidth=1;
  for(let r=R*0.42;r<R;r+=Math.max(5,R*0.03)){ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();}
  ctx.save();ctx.beginPath();ctx.arc(0,0,R*0.40,0,Math.PI*2);ctx.clip();
  if(firmaOk){ctx.drawImage(firmaImg,-R*0.40,-R*0.40,R*0.80,R*0.80);}
  else{ctx.fillStyle="#16201b";ctx.fillRect(-R*0.4,-R*0.4,R*0.8,R*0.8);
    ctx.fillStyle="#a9b88c";ctx.font="600 "+Math.round(R*0.1)+"px Archivo";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("TOBAL BLU",0,0);}
  ctx.restore();
  ctx.beginPath();ctx.arc(0,0,R*0.40,0,Math.PI*2);ctx.strokeStyle="rgba(244,244,242,.1)";ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,R*0.03,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();
  ctx.restore();
}

/* río vertical: corriente que baja por los carriles + surcos de vinilo */
function drawRiver(time,L,hitY,topY){
  /* lecho */
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0a1116");g.addColorStop(0.55,"#0b181d");g.addColorStop(1,"#0a0f0c");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  /* carriles tenues */
  ctx.save();
  for(const k in L){const x=L[k];
    const lg=ctx.createLinearGradient(0,topY,0,hitY);
    lg.addColorStop(0,"rgba(143,211,236,0)");lg.addColorStop(1,"rgba(143,211,236,.05)");
    ctx.fillStyle=lg;ctx.fillRect(x-W*0.085,topY,W*0.17,hitY-topY);}
  ctx.restore();
  /* corriente que fluye hacia abajo (sine horizontal animado) */
  ctx.lineWidth=1;
  const off=(time*180)%48;
  for(let i=0;i<7;i++){
    const baseX=W*(0.18+i*0.105);
    ctx.strokeStyle="rgba(143,211,236,"+(0.05+0.03*Math.sin(i))+")";
    ctx.beginPath();
    for(let y=topY-40;y<H;y+=14){const xx=baseX+Math.sin((y+off+i*40)/46)*W*0.03;y===topY-40?ctx.moveTo(xx,y):ctx.lineTo(xx,y);}
    ctx.stroke();}
  /* ondas de hat (ripple) descendiendo desde el carril central */
  for(const ht of hatTimes){const dt=time-ht;if(dt<0||dt>0.5)continue;const a=1-dt/0.5;
    const x=L.hat+Math.sin(ht*3)*W*0.06;const y=topY+(hitY-topY)*((ht*0.6)%1);
    ctx.strokeStyle="rgba(143,211,236,"+(a*0.22)+")";ctx.beginPath();ctx.arc(x,y,6+dt*42,0,Math.PI*2);ctx.stroke();}
}

/* líneas de compás descendiendo (estilo highway) */
function drawBeatLines(time,hitY,pps,L){
  const x0=L.kick-W*0.10, x1=L.snare+W*0.10;
  const sb=Math.floor((time-0.3)/BEAT),eb=Math.ceil((time+TRAVEL)/BEAT);
  ctx.textAlign="left";ctx.textBaseline="middle";
  for(let bb=sb;bb<=eb;bb++){if(bb<0)continue;const y=hitY-(bb*BEAT-time)*pps;if(y<0||y>hitY+8)continue;
    const dn=(bb%4===0);
    ctx.strokeStyle=dn?"rgba(244,244,242,.22)":"rgba(244,244,242,.08)";ctx.lineWidth=dn?2:1;
    ctx.beginPath();ctx.moveTo(x0,y);ctx.lineTo(x1,y);ctx.stroke();
    if(dn){ctx.fillStyle="rgba(244,244,242,.30)";ctx.font="300 11px Archivo, sans-serif";
      ctx.fillText(String(Math.floor(bb/4)+1),x1+6,y);}}
}

/* zona de impacto inferior + dianas por carril */
function drawHitZone(time,L,hitY){
  ctx.strokeStyle="rgba(244,244,242,.30)";ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(L.kick-W*0.12,hitY);ctx.lineTo(L.snare+W*0.12,hitY);ctx.stroke();
  const COL={kick:"169,184,140",hat:"232,207,139",snare:"143,211,236"};
  for(const k in L){const x=L[k];const fl=Math.max(0,1-(time-laneFlash[k])/0.18);
    const r=H*0.022;
    ctx.strokeStyle="rgba("+COL[k]+","+(0.35+fl*0.5)+")";ctx.lineWidth=2+fl*2;
    ctx.beginPath();ctx.arc(x,hitY,r*(1+fl*0.4),0,Math.PI*2);ctx.stroke();
    if(fl>0){ctx.fillStyle="rgba("+COL[k]+","+(fl*0.25)+")";ctx.beginPath();ctx.arc(x,hitY,r*(1+fl*0.4),0,Math.PI*2);ctx.fill();}}
}

function drawHatNotes(time,x,hitY,pps){
  for(const n of hatNotes){const dt=n.t-time;if(dt>TRAVEL+0.1||dt<-0.5)continue;const y=hitY-dt*pps;
    if(!n.judged&&(n.t+WIN)<time){n.judged=true;n.res="miss";}   // hats NO cuestan vida
    const judged=n.judged,res=n.res;
    const r=H*0.011*((judged&&res!=="miss"&&time-n.t<0.14)?1.8:1);
    let col=res==="perfecto"?"#8fd3ec":res==="bien"?"#cfe9f5":res==="miss"?"#34464c":"#9fc4d2";
    ctx.globalAlpha=judged?(res==="miss"?0.22:0.5):0.85;
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
}
function drawSnareNotes(time,x,hitY,pps){
  for(const n of snareNotes){const dt=n.t-time;if(dt>TRAVEL+0.15||dt<-0.55)continue;const y=hitY-dt*pps;
    if(!n.judged&&(n.t+WIN)<time){n.judged=true;n.res="fallo";loseLife();}
    const judged=n.judged,res=n.res;
    const pop=(judged&&time-n.t<0.16)?1+(0.16-(time-n.t))*2.2:1;const s=H*0.024*pop;
    let col=res==="perfecto"?"#8fd3ec":res==="bien"?"#e8cf8b":res==="fallo"?"#e0876f":"#cfe9f5";
    /* estela */
    ctx.globalAlpha=judged?0.15:0.3;ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-s*2.2);ctx.stroke();
    /* hexágono */
    ctx.globalAlpha=judged?0.4:0.95;ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.beginPath();
    for(let k=0;k<6;k++){const a=k/6*Math.PI*2-Math.PI/2;const px=x+Math.cos(a)*s,py=y+Math.sin(a)*s;k?ctx.lineTo(px,py):ctx.moveTo(px,py);}
    ctx.closePath();ctx.stroke();ctx.fillStyle=col;ctx.globalAlpha*=0.25;ctx.fill();ctx.globalAlpha=1;}
}
function drawKickNotes(time,x,hitY,pps){
  for(const n of kickNotes){const dt=n.t-time;if(dt>TRAVEL+0.15||dt<-0.55)continue;const y=hitY-dt*pps;
    if(!n.judged&&(n.t+WIN)<time){n.judged=true;n.res="fallo";loseLife();}
    const judged=n.judged,res=n.res;
    const pop=(judged&&time-n.t<0.16)?1+(0.16-(time-n.t))*2:1;const rw=H*0.038*pop,rh=H*0.028*pop;
    let col=res==="perfecto"?"#9fb07f":res==="bien"?"#c9b878":res==="fallo"?"#a05a4a":"#6b6b66";
    ctx.globalAlpha=judged?0.4:1;ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y,rw,rh,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.18)";ctx.beginPath();ctx.ellipse(x-rw*0.25,y-rh*0.3,rw*0.45,rh*0.3,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
}
function updateKnight(){if(knight.hopV!==0||knight.hop>0){knight.hopV-=0.045;knight.hop+=knight.hopV*0.12;if(knight.hop<=0){knight.hop=0;knight.hopV=0;}}}

/* ===========================================================================
   INIT
   =========================================================================== */
wireHotspots();loadMusic();loadSamples();
requestAnimationFrame(draw);
</script>
