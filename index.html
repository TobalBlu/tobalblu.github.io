<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tobal Blu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      font-family: 'Courier New', monospace;
      color: #eee;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 2.5rem;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('img/hero.JPG');
      background-size: cover;
      background-position: center;
      filter: brightness(0.5);
      transform: scale(1.05);
      transition: transform 8s ease;
    }

    .hero:hover .hero-bg {
      transform: scale(1);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, #080808 100%);
    }

    .firma {
      position: relative;
      z-index: 2;
      width: min(320px, 70vw);
      mix-blend-mode: screen;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1.4s ease forwards 0.4s;
    }

    /* NAV */
    nav {
      position: absolute;
      bottom: 2.8rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 3.5rem;
      z-index: 3;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1s;
    }

    nav a {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
      transition: color 0.4s ease;
    }

    nav a:hover { color: #fff; }

    .scroll-hint {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: #2a2a2a;
      z-index: 3;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <img class="firma" src="img/firma.jpeg" alt="Tobal Blu">
  <nav>
    <a href="musica.html">music</a>
    <a href="#">gallery</a>
    <a href="#">me</a>
  </nav>
  <div class="scroll-hint">scroll</div>
</section>

</body>
</html>
