    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      font-family: 'Courier New', monospace;
      color: #eee;
      min-height: 100vh;
    }

    /* ===== SELECTOR DE PROYECTOS (sin cambios) ===== */
    .selector {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .proyecto {
      flex: 1;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .proyecto:hover { flex: 2.5; }
    .proyecto.expandido { flex: 2.5; }

    .proyecto-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.4);
      transition: filter 0.6s ease, transform 0.6s ease;
      transform: scale(1.05);
    }

    .proyecto:hover .proyecto-bg {
      filter: brightness(0.65);
      transform: scale(1);
    }

    .proyecto-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #080808 0%, transparent 60%);
    }

    .proyecto-info {
      position: absolute;
      bottom: 2.5rem;
      left: 2rem;
      right: 2rem;
      z-index: 2;
      text-align: center;
    }

    .proyecto-nombre {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.5rem;
      transition: color 0.4s ease;
    }

    .proyecto:hover .proyecto-nombre { color: #fff; }

    .proyecto-enter {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #333;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s;
    }

    .proyecto:hover .proyecto-enter {
      opacity: 1;
      transform: translateY(0);
      color: #555;
    }

    .divider {
      position: absolute;
      top: 0;
      right: 0;
      width: 0.5px;
      height: 100%;
      background: #1a1a1a;
    }

    /* ===== PÁGINA DE PROYECTO ===== */
    .proyecto-page {
      display: none;
      min-height: 100vh;
      padding: 3rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .proyecto-page.active { display: block; }

    .back {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      cursor: pointer;
      transition: color 0.3s;
      margin-bottom: 3rem;
      display: inline-block;
    }

    .back:hover { color: #aaa; }

    .proyecto-titulo {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 1.2rem;
    }

    .plataformas {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 3.5rem;
    }

    .plataformas a {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      text-decoration: none;
      transition: color 0.3s;
      border-bottom: 0.5px solid #222;
      padding-bottom: 2px;
    }

    .plataformas a:hover { color: #ccc; border-color: #555; }

    /* ===== CAJONES POR AÑO ===== */
    .crates {
      display: flex;
      gap: 3rem;
      overflow-x: auto;
      padding: 4rem 1rem 2rem 1rem;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }

    .crates::-webkit-scrollbar { height: 4px; }
    .crates::-webkit-scrollbar-track { background: #0f0f0f; }
    .crates::-webkit-scrollbar-thumb { background: #222; }

    .year-col {
      flex: 0 0 auto;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .crate {
      position: relative;
      width: 220px;
      perspective: 900px;
      /* altura la fija JS según cantidad de discos */
    }

    .disco {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 220px;
      height: 220px;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.3, 1),
                  filter 0.45s ease;
      cursor: pointer;
    }

    .disco img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border: 0.5px solid #1e1e1e;
      background: #111;
    }

    .year-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: #555;
      margin-top: 1.4rem;
    }

    .disco-caption {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
      margin-top: 0.6rem;
      text-align: center;
      min-height: 2.2em;
      max-width: 220px;
    }

    @media (max-width: 600px) {
      .crate, .disco { width: 160px; }
      .disco { height: 160px; }
      .disco-caption { max-width: 160px; }
      .crates { gap: 2rem; }
      .proyecto-page { padding: 2.5rem 1.2rem; }
    }

    .home-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #333;
      text-decoration: none;
      transition: color 0.3s;
      z-index: 10;
    }

    .home-link:hover { color: #888; }
  </style>

/* ===== RENDER DE CAJONES ===== */
var PEEK = 46;    /* px que asoma cada disco trasero */
var DEPTH = 55;   /* profundidad Z entre discos */
var TILT = 7;     /* inclinación X en grados */

function renderCrates(proyecto) {
  var contenedor = document.getElementById('crates-' + proyecto);
  if (contenedor.childNodes.length > 0) return; /* ya renderizado */

  var lista = lanzamientos[proyecto].slice().sort(function(a, b) {
    return a.fecha < b.fecha ? -1 : 1;
  });

  /* agrupar por año */
  var porAno = {};
  lista.forEach(function(l) {
    var ano = l.fecha.slice(0, 4);
    if (!porAno[ano]) porAno[ano] = [];
    porAno[ano].push(l);
  });

  Object.keys(porAno).sort().forEach(function(ano) {
    var discos = porAno[ano];

    /* destacado al frente, el resto detrás en orden cronológico */
    var frente = discos.findIndex(function(d) { return d.destacado; });
    if (frente === -1) frente = 0;
    var orden = [discos[frente]].concat(
      discos.filter(function(d, i) { return i !== frente; })
    );

    var col = document.createElement('div');
    col.className = 'year-col';

    var crate = document.createElement('div');
    crate.className = 'crate';
    var discoSize = window.innerWidth <= 600 ? 160 : 220;
    crate.style.height = (discoSize + (orden.length - 1) * PEEK) + 'px';

    orden.forEach(function(l, i) {
      var d = document.createElement('div');
      d.className = 'disco';
      d.style.zIndex = orden.length - i;
      d.style.transform =
        'translateY(' + (-i * PEEK) + 'px) ' +
        'translateZ(' + (-i * DEPTH) + 'px) ' +
        'rotateX(' + TILT + 'deg)';
      d.style.filter = 'brightness(' + Math.max(1 - i * 0.18, 0.45) + ')';

      var img = document.createElement('img');
      img.src = l.portada;
      img.alt = l.titulo;
      img.loading = 'lazy';
      d.appendChild(img);

      crate.appendChild(d);
    });

    var label = document.createElement('div');
    label.className = 'year-label';
    label.textContent = ano;

    var caption = document.createElement('div');
    caption.className = 'disco-caption';
    caption.textContent = orden[0].titulo + ' · ' + orden[0].display;

    col.appendChild(crate);
    col.appendChild(label);
    col.appendChild(caption);
    contenedor.appendChild(col);
  });
}

/* ===== NAVEGACIÓN (patrón existente) ===== */
document.addEventListener('DOMContentLoaded', function() {

  document.querySelectorAll('.proyecto').forEach(function(el) {
    el.addEventListener('click', function() {
      var id = this.getAttribute('data-id');
      if (this.classList.contains('expandido')) {
        document.getElementById('selector').style.display = 'none';
        document.querySelectorAll('.proyecto-page').forEach(function(p) {
          p.classList.remove('active');
        });
        document.getElementById('page-' + id).classList.add('active');
        renderCrates(id);
      } else {
        document.querySelectorAll('.proyecto').forEach(function(p) {
          p.classList.remove('expandido');
        });
        this.classList.add('expandido');
      }
    });
  });

  document.querySelectorAll('[data-back]').forEach(function(el) {
    el.addEventListener('click', function() {
      document.getElementById('selector').style.display = 'flex';
      document.querySelectorAll('.proyecto-page').forEach(function(p) {
        p.classList.remove('active');
      });
    });
  });

});
</script>
