img { display:block; max-width:100%; height:auto; }
a { color:inherit; text-decoration:none; }
a:focus-visible { outline:2px solid var(--vino-bright); outline-offset:3px; border-radius:2px; }

/* ============================================================
   ANIMACIONES
   ============================================================ */
@media (prefers-reduced-motion: no-preference) {
  .reveal {
    opacity:0;
    transform:translateY(20px);
    transition: opacity 0.9s var(--ease-out), transform 0.9s var(--ease-out);
  }
  .reveal.visible { opacity:1; transform:translateY(0); }
  .reveal-d1 { transition-delay:0.1s; }
  .reveal-d2 { transition-delay:0.22s; }
  .reveal-d3 { transition-delay:0.34s; }
  .reveal-d4 { transition-delay:0.46s; }
}

/* ============================================================
   LÍNEA AUTORAL
   ============================================================ */
#linea-autoral {
  position:fixed; left:clamp(12px,2.5vw,28px); top:0;
  width:2px; height:100vh; pointer-events:none; z-index:10;
}
#linea-stroke {
  stroke:var(--vino); stroke-width:1.5;
  stroke-dasharray:100vh; stroke-dashoffset:100vh;
}
@media (max-width:767px) { #linea-autoral { display:none; } }

/* ============================================================
   NAVEGACIÓN
   ============================================================ */
.nav {
  position:sticky; top:0; z-index:100;
  background:rgba(13,17,23,0.88);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:0.5px solid var(--linea);
}
.nav-inner {
  max-width:var(--max-w); margin:0 auto;
  padding:0 var(--pad-x); height:52px;
  display:flex; align-items:center; justify-content:space-between; gap:24px;
}
.nav-marca {
  font-family:var(--font-display); font-size:15px; font-weight:300;
  letter-spacing:0.06em; color:var(--cream); white-space:nowrap; flex-shrink:0;
}
.nav-links { display:flex; align-items:center; gap:28px; list-style:none; }
.nav-links a {
  font-family:var(--font-ui); font-size:10px; font-weight:300;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--grafito);
  transition:color 0.2s;
}
.nav-links a:hover { color:var(--cream); }
.nav-links a.active { color:var(--vino-bright); border-bottom:1px solid var(--vino); padding-bottom:1px; }
.nav-menu-btn {
  display:none; background:none; border:none; cursor:pointer; padding:6px; color:var(--cream);
}
.nav-mobile {
  display:none; position:fixed; inset:52px 0 0 0;
  background:rgba(13,17,23,0.97); z-index:99;
  padding:32px var(--pad-x); border-top:0.5px solid var(--linea);
}
.nav-mobile.open { display:flex; flex-direction:column; gap:20px; }
.nav-mobile a {
  font-family:var(--font-ui); font-size:12px; font-weight:300;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--grafito);
  padding:10px 0; border-bottom:0.5px solid var(--linea);
}
.nav-mobile a.active { color:var(--vino-bright); }
@media (max-width:767px) {
  .nav-links { display:none; }
  .nav-menu-btn { display:block; }
}

/* ============================================================
   HERO
   ============================================================ */
.hero {
  max-width:var(--max-w); margin:0 auto;
  padding:clamp(56px,9vw,112px) var(--pad-x) clamp(56px,8vw,96px);
  display:grid; grid-template-columns:1fr 1fr;
  gap:clamp(32px,5vw,80px); align-items:center; min-height:88vh;
}
.hero-eyebrow {
  font-family:var(--font-ui); font-size:9px; font-weight:300;
  letter-spacing:0.3em; text-transform:uppercase; color:var(--vino-bright);
  margin-bottom:20px; display:block;
}
.hero-nombre {
  font-family:var(--font-display); font-size:clamp(40px,5.5vw,66px);
  font-weight:300; letter-spacing:-0.02em; line-height:1.02;
  color:var(--cream); margin-bottom:14px;
}
.hero-rol {
  font-family:var(--font-ui); font-size:10px; font-weight:300;
  letter-spacing:0.22em; text-transform:uppercase; color:var(--grafito);
  margin-bottom:5px;
}
.hero-sub {
  font-family:var(--font-display); font-size:13px; font-style:italic;
  color:var(--cream-muted); margin-bottom:36px;
}
.hero-propuesta {
  font-size:clamp(15px,1.6vw,17px); font-weight:300; line-height:1.75;
  color:var(--cream-dim); max-width:480px; margin-bottom:28px;
}
.hero-propuesta strong { font-weight:400; color:var(--cream); }
.hero-busqueda {
  display:inline-block; font-family:var(--font-ui); font-size:10px;
  font-weight:400; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--vino-bright); border-bottom:1px solid var(--vino); padding-bottom:2px;
}
.hero-foto-wrap {
  position:relative; aspect-ratio:3/4; overflow:hidden;
  background:rgba(255,255,255,0.04); border:0.5px solid var(--linea);
}
.hero-foto-wrap img { width:100%; height:100%; object-fit:cover; object-position:center 20%; filter:contrast(1.04) brightness(0.9) saturate(0.8); }
.hero-foto-ph {
  width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px; padding:20px;
}
.hero-foto-ph span { font-family:var(--font-ui); font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.18); text-align:center; line-height:1.6; }
.scroll-hint {
  margin-top:44px; display:flex; align-items:center; gap:10px; color:var(--grafito);
}
.scroll-hint-line { width:32px; height:0.5px; background:var(--grafito); }
.scroll-hint span { font-family:var(--font-ui); font-size:9px; letter-spacing:0.22em; text-transform:uppercase; }
@media (max-width:900px) {
  .hero { grid-template-columns:1fr; min-height:auto; }
  .hero-foto-wrap { aspect-ratio:16/9; max-height:300px; }
  .scroll-hint { display:none; }
}

/* ============================================================
   EVIDENCIA PRINCIPAL
   ============================================================ */
.evidencia-wrap {
  background:rgba(0,0,0,0.45);
  border-top:0.5px solid var(--linea);
  border-bottom:0.5px solid var(--linea);
  padding:clamp(40px,6vw,72px) var(--pad-x);
}
.evidencia-inner { max-width:var(--max-w); margin:0 auto; }
.ev-label {
  font-family:var(--font-ui); font-size:9px; font-weight:300;
  letter-spacing:0.26em; text-transform:uppercase; color:var(--cream-muted);
  margin-bottom:44px; display:block;
}
.evidencia-grid {
  display:grid; grid-template-columns:2.2fr 1fr 1fr 1fr;
  gap:0; align-items:end;
  border-top:0.5px solid var(--linea); padding-top:36px;
}

<script>
// Menú móvil
const menuBtn = document.getElementById("menu-btn");
const navMobile = document.getElementById("nav-mobile");
menuBtn.addEventListener("click", () => {
  const open = navMobile.classList.toggle("open");
  menuBtn.setAttribute("aria-expanded", open);
  menuBtn.setAttribute("aria-label", open ? "Cerrar menú" : "Abrir menú");
});

// Reveal con IntersectionObserver
if (window.matchMedia("(prefers-reduced-motion: no-preference)").matches) {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } });
  }, { threshold: 0.07, rootMargin: "0px 0px -32px 0px" });
  document.querySelectorAll(".reveal").forEach(el => obs.observe(el));
}

// Línea autoral
const lineaStroke = document.getElementById("linea-stroke");
if (lineaStroke) {
  function updateLinea() {
    const pct = Math.min(window.scrollY / (document.documentElement.scrollHeight - window.innerHeight), 1);
    lineaStroke.style.strokeDasharray = window.innerHeight + "px";
    lineaStroke.style.strokeDashoffset = ((1 - pct) * window.innerHeight) + "px";
  }
  window.addEventListener("scroll", updateLinea, { passive: true });
  updateLinea();
}
</script>
